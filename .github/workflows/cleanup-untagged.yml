name: Safe Cleanup (Keep Recent)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '镜像名'
        required: true
        default: 'lunatv'

jobs:
  safe-cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.inputs.package_name }}
          package-type: 'container'
          delete-only-untagged-versions: 'true'
          # --- 关键修改：保留最近 5 个没标签的版本 ---
          # 这样即便刚构建完还没来得及合并，零件也不会被删掉
          min-versions-to-keep: 5
